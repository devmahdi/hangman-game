<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .hangman-visual {
            font-family: 'Courier New', monospace;
            white-space: pre;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            line-height: 1.2;
            margin-bottom: 30px;
            color: #333;
        }

        .word-display {
            text-align: center;
            font-size: 2em;
            letter-spacing: 10px;
            margin-bottom: 30px;
            color: #333;
            font-weight: bold;
            min-height: 60px;
        }

        .alphabet {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
            margin-bottom: 30px;
        }

        .letter-btn {
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .letter-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .letter-btn:disabled {
            background: #ddd;
            border-color: #ddd;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .letter-btn.wrong {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: white;
        }

        .letter-btn.correct {
            background: #51cf66;
            border-color: #51cf66;
            color: white;
        }

        .game-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .attempts {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 10px;
        }

        .message {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.win {
            color: #51cf66;
        }

        .message.lose {
            color: #ff6b6b;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Hangman Game</h1>
        
        <div class="hangman-visual" id="hangman"></div>
        
        <div class="game-info">
            <div class="attempts" id="attempts">Wrong guesses: 0 / 6</div>
        </div>
        
        <div class="word-display" id="word-display"></div>
        
        <div class="message" id="message"></div>
        
        <div class="alphabet" id="alphabet"></div>
        
        <button class="reset-btn" id="reset-btn">New Game</button>
    </div>

    <script>
        // Word list
        const words = [
            'JAVASCRIPT', 'PROGRAMMING', 'COMPUTER', 'DEVELOPER', 'ALGORITHM',
            'FUNCTION', 'VARIABLE', 'DATABASE', 'INTERFACE', 'KEYBOARD',
            'MONITOR', 'SOFTWARE', 'HARDWARE', 'NETWORK', 'INTERNET',
            'BROWSER', 'CONSOLE', 'DEBUGGING', 'COMPILE', 'EXECUTE',
            'MEMORY', 'PROCESSOR', 'CIRCUIT', 'BINARY', 'DIGITAL'
        ];

        // Hangman stages (ASCII art)
        const hangmanStages = [
            // Stage 0 - empty
            `
  +---+
  |   |
      |
      |
      |
      |
=========`,
            // Stage 1 - head
            `
  +---+
  |   |
  O   |
      |
      |
      |
=========`,
            // Stage 2 - body
            `
  +---+
  |   |
  O   |
  |   |
      |
      |
=========`,
            // Stage 3 - left arm
            `
  +---+
  |   |
  O   |
 /|   |
      |
      |
=========`,
            // Stage 4 - right arm
            `
  +---+
  |   |
  O   |
 /|\\  |
      |
      |
=========`,
            // Stage 5 - left leg
            `
  +---+
  |   |
  O   |
 /|\\  |
 /    |
      |
=========`,
            // Stage 6 - right leg (game over)
            `
  +---+
  |   |
  O   |
 /|\\  |
 / \\  |
      |
=========`
        ];

        // Game state
        let currentWord = '';
        let guessedLetters = [];
        let wrongGuesses = 0;
        let maxWrongGuesses = 6;
        let gameOver = false;

        // DOM elements
        const hangmanElement = document.getElementById('hangman');
        const wordDisplayElement = document.getElementById('word-display');
        const alphabetElement = document.getElementById('alphabet');
        const messageElement = document.getElementById('message');
        const attemptsElement = document.getElementById('attempts');
        const resetBtn = document.getElementById('reset-btn');

        // Initialize game
        function initGame() {
            // Reset state
            currentWord = words[Math.floor(Math.random() * words.length)];
            guessedLetters = [];
            wrongGuesses = 0;
            gameOver = false;

            // Reset UI
            messageElement.textContent = '';
            messageElement.className = 'message';
            updateHangman();
            updateWordDisplay();
            updateAttempts();
            createAlphabet();
        }

        // Create alphabet buttons
        function createAlphabet() {
            alphabetElement.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'letter-btn';
                btn.addEventListener('click', () => handleGuess(letter, btn));
                alphabetElement.appendChild(btn);
            }
        }

        // Handle letter guess
        function handleGuess(letter, btn) {
            if (gameOver || guessedLetters.includes(letter)) return;

            guessedLetters.push(letter);
            btn.disabled = true;

            if (currentWord.includes(letter)) {
                // Correct guess
                btn.classList.add('correct');
                updateWordDisplay();
                checkWin();
            } else {
                // Wrong guess
                btn.classList.add('wrong');
                wrongGuesses++;
                updateHangman();
                updateAttempts();
                checkLoss();
            }
        }

        // Update hangman visual
        function updateHangman() {
            hangmanElement.textContent = hangmanStages[wrongGuesses];
        }

        // Update word display
        function updateWordDisplay() {
            const display = currentWord
                .split('')
                .map(letter => guessedLetters.includes(letter) ? letter : '_')
                .join(' ');
            wordDisplayElement.textContent = display;
        }

        // Update attempts counter
        function updateAttempts() {
            attemptsElement.textContent = `Wrong guesses: ${wrongGuesses} / ${maxWrongGuesses}`;
        }

        // Check for win
        function checkWin() {
            const won = currentWord.split('').every(letter => guessedLetters.includes(letter));
            if (won) {
                gameOver = true;
                messageElement.textContent = '🎉 You Win!';
                messageElement.classList.add('win');
                disableAllButtons();
            }
        }

        // Check for loss
        function checkLoss() {
            if (wrongGuesses >= maxWrongGuesses) {
                gameOver = true;
                messageElement.textContent = `😢 Game Over! Word was: ${currentWord}`;
                messageElement.classList.add('lose');
                wordDisplayElement.textContent = currentWord.split('').join(' ');
                disableAllButtons();
            }
        }

        // Disable all letter buttons
        function disableAllButtons() {
            const buttons = alphabetElement.querySelectorAll('.letter-btn');
            buttons.forEach(btn => btn.disabled = true);
        }

        // Reset button handler
        resetBtn.addEventListener('click', initGame);

        // Start the game
        initGame();
    </script>
</body>
</html>
